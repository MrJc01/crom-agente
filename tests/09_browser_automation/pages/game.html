<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Click Game — Browser Automation Test</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; overflow: hidden; }
        .hud { position: fixed; top: 0; left: 0; right: 0; padding: 20px 30px; display: flex; justify-content: space-between; background: rgba(15, 23, 42, 0.9); backdrop-filter: blur(10px); z-index: 10; }
        .score { font-size: 2rem; font-weight: 700; color: #38bdf8; }
        .timer { font-size: 1.2rem; color: #94a3b8; }
        #target { position: absolute; width: 80px; height: 80px; border-radius: 50%; background: linear-gradient(135deg, #f43f5e, #ec4899); cursor: pointer; display: flex; align-items: center; justify-content: center; font-size: 2rem; box-shadow: 0 0 30px rgba(244, 63, 94, 0.5); transition: transform 0.1s; user-select: none; }
        #target:hover { transform: scale(1.1); }
        #target:active { transform: scale(0.95); }
        #gameOver { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 20; }
        #gameOver h1 { font-size: 3rem; color: #38bdf8; margin-bottom: 10px; }
        #gameOver p { font-size: 1.5rem; color: #94a3b8; }
    </style>
</head>
<body>
    <div class="hud">
        <div class="score">Score: <span id="scoreDisplay">0</span></div>
        <div class="timer">Cliques: <span id="clickCount">0</span></div>
    </div>

    <div id="target" onclick="handleClick()">🎯</div>

    <div id="gameOver">
        <h1>🎉 Você venceu!</h1>
        <p>Score final: <span id="finalScore">0</span></p>
    </div>

    <script>
        let score = 0;
        let clicks = 0;
        const WIN_SCORE = 5;

        function randomPosition() {
            const target = document.getElementById('target');
            const maxX = window.innerWidth - 100;
            const maxY = window.innerHeight - 100;
            const x = Math.floor(Math.random() * maxX) + 10;
            const y = Math.floor(Math.random() * (maxY - 80)) + 80;
            target.style.left = x + 'px';
            target.style.top = y + 'px';
        }

        function handleClick() {
            score++;
            clicks++;
            document.getElementById('scoreDisplay').textContent = score;
            document.getElementById('clickCount').textContent = clicks;

            if (score >= WIN_SCORE) {
                document.getElementById('gameOver').style.display = 'flex';
                document.getElementById('finalScore').textContent = score;
                document.getElementById('target').style.display = 'none';
                return;
            }

            randomPosition();
        }

        // Posição inicial
        randomPosition();
    </script>
</body>
</html>
